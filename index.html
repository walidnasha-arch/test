<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=0.9,viewport-fit=cover">
<style>
body { background:#111; display:flex; flex-direction:column; align-items:center; padding:40px; gap:20px; }
p { color:white; font-family:sans-serif; font-size:13px; }
.act-wrap { position:relative; width:221px; height:110px; }
.act-btn {
  position:absolute; inset:0;
  background:rgba(10,5,18,1);
  border:1px solid rgba(180,50,10,.4);
  border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  color:white; font-family:sans-serif; z-index:1;
}
.act-border-sprite {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  border-radius:11px;
  overflow:hidden;
  z-index:2;
  pointer-events:none;
}
.act-border-sprite img {
  display:block;
  transition:none !important;
  animation:none !important;
}
</style>
</head>
<body>
  <p>Test margin-left avec viewport correct :</p>
  <div class="act-wrap">
    <div class="act-btn">Attaque Simple</div>
    <div class="act-border-sprite" id="border"></div>
  </div>
  <div id="debug" style="color:#888;font-size:11px;line-height:1.8;"></div>

<script>
const FRAMES = 75, FPS = 10;
const DESKTOP_W = 229.5;
const ratio = window.innerWidth < 480
  ? Math.min(1, (window.innerWidth - 21) / 2 / DESKTOP_W)
  : 1;
const DIV_W = Math.round(233 * ratio);
const DIV_H = Math.round(122 * ratio);

let frame = 0, direction = 1, fw = 0;

function attach(){
  const div = document.getElementById('border');
  div.style.width  = DIV_W + 'px';
  div.style.height = DIV_H + 'px';

  const img = document.createElement('img');
  img.src = 'texture.png';
  img.alt = ''; img.draggable = false;
  img.style.transition = 'none';
  img.style.animation  = 'none';

  img.onload = function(){
    const nativeFW = img.naturalWidth / FRAMES;
    const scale    = DIV_W / nativeFW;
    img.style.width  = Math.round(img.naturalWidth  * scale) + 'px';
    img.style.height = Math.round(img.naturalHeight * scale) + 'px';
    img.style.marginLeft = '0px';
    fw = DIV_W;

    document.getElementById('debug').innerHTML =
      'innerWidth:' + window.innerWidth + ' ratio:' + ratio.toFixed(3) +
      '<br>DIV_W:' + DIV_W + ' fw:' + fw + ' imgW:' + img.style.width;
  };

  div.appendChild(img);
}

function tick(){
  if(!fw) return;
  frame += direction;
  if(frame >= FRAMES-1){ frame=FRAMES-1; direction=-1; }
  else if(frame <= 0)  { frame=0;        direction= 1; }
  const img = document.querySelector('.act-border-sprite img');
  if(img) img.style.marginLeft = -Math.round(frame * fw) + 'px';
}

attach();
setInterval(tick, 1000/FPS);
</script>
</body>
</html>
