<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=0.9,viewport-fit=cover">
<style>
body { background:#111; display:flex; flex-direction:column; align-items:center; padding:40px; gap:20px; }
p { color:white; font-family:sans-serif; font-size:14px; }
.act-wrap { position:relative; width:221px; height:110px; }
.act-btn {
  position:absolute; inset:0;
  background:rgba(10,5,18,1);
  border:1px solid rgba(180,50,10,.4);
  border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  color:white; font-family:sans-serif; z-index:1;
}
.act-border-sprite {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  border-radius:9px;
  overflow:hidden;
  z-index:2;
  pointer-events:none;
}
.act-border-sprite img {
  display:block;
  transition:none !important;
  animation:none !important;
}
</style>
</head>
<body>
  <p>Test bordure — coins et hauteur :</p>
  <div class="act-wrap">
    <div class="act-btn" id="btn">Attaque Simple</div>
    <div class="act-border-sprite" id="border"></div>
  </div>
  <div id="debug" style="color:#888;font-size:11px;line-height:1.8;margin-top:10px;"></div>

<script>
const FRAMES = 75, FPS = 10, MARGIN = 6;
let frame = 0, direction = 1, fw = 0;

const btn = document.getElementById('btn');
const div = document.getElementById('border');

// On fixe DIV_H à 122px (taille compo AE) peu importe la hauteur du btn
const DIV_W = btn.offsetWidth + MARGIN * 2;
const DIV_H = 122; // hauteur fixe = compo AE

div.style.width  = DIV_W + 'px';
div.style.height = DIV_H + 'px';

document.getElementById('debug').innerHTML =
  'btnW:' + btn.offsetWidth + ' btnH:' + btn.offsetHeight +
  '<br>DIV_W:' + DIV_W + ' DIV_H:' + DIV_H;

const img = document.createElement('img');
img.src = 'texture.png';
img.alt = ''; img.draggable = false;
img.style.transition = 'none';
img.style.animation  = 'none';

img.onload = function(){
  const nativeFW = img.naturalWidth / FRAMES;
  const scale    = DIV_W / nativeFW;
  img.style.width  = Math.round(img.naturalWidth  * scale) + 'px';
  img.style.height = Math.round(img.naturalHeight * scale) + 'px';
  img.style.marginLeft = '0px';
  fw = DIV_W;
};

div.appendChild(img);

setInterval(() => {
  if(!fw) return;
  frame += direction;
  if(frame >= FRAMES-1){ frame=FRAMES-1; direction=-1; }
  else if(frame <= 0)  { frame=0;        direction= 1; }
  img.style.marginLeft = -Math.round(frame * fw) + 'px';
}, 1000/FPS);
</script>
</body>
</html>
